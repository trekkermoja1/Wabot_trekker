name: Auto Commit to All Repositories

on:
  schedule:
    # Runs every 3 hours
    - cron: '0 */3 * * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.Trekker }}
          fetch-depth: 0
      
      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Get all repositories
        id: get-repos
        run: |
          # Get authenticated user
          USER=$(curl -s -H "Authorization: token ${{ secrets.Trekker }}" \
            https://api.github.com/user | jq -r '.login')
          
          # Get all repositories for the user
          REPOS=$(curl -s -H "Authorization: token ${{ secrets.Trekker }}" \
            "https://api.github.com/user/repos?per_page=100&affiliation=owner" | \
            jq -r '.[].full_name')
          
          echo "repositories<<EOF" >> $GITHUB_OUTPUT
          echo "$REPOS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "username=$USER" >> $GITHUB_OUTPUT
      
      - name: Commit to all repositories
        env:
          PAT_TOKEN: ${{ secrets.Trekker }}
          REPOS: ${{ steps.get-repos.outputs.repositories }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          COMMIT_MESSAGE="Auto-commit: Activity logged at $TIMESTAMP (commits viewed within 3hrs)"
          
          # Create temporary directory
          mkdir -p /tmp/repos
          cd /tmp/repos
          
          # Process each repository
          echo "$REPOS" | while read -r repo; do
            if [ -z "$repo" ]; then
              continue
            fi
            
            echo "Processing repository: $repo"
            
            # Clone repository with PAT
            git clone "https://${PAT_TOKEN}@github.com/${repo}.git" "${repo##*/}" 2>/dev/null || {
              echo "Failed to clone $repo"
              continue
            }
            
            cd "${repo##*/}"
            
            # Get default branch
            DEFAULT_BRANCH=$(git symbolic-ref refs/remotes/origin/HEAD | sed 's@^refs/remotes/origin/@@')
            git checkout "$DEFAULT_BRANCH" 2>/dev/null || git checkout main 2>/dev/null || git checkout master 2>/dev/null
            
            # Create or update activity log file (force add to bypass .gitignore)
            echo "$TIMESTAMP - Automated activity commit" >> activity-log.txt
            
            # Add and commit changes (force add to bypass .gitignore)
            git add -f activity-log.txt
            
            # Check if there are changes to commit
            if git diff --staged --quiet; then
              echo "No changes to commit for $repo"
              cd ..
              rm -rf "${repo##*/}"
              continue
            fi
            
            git commit -m "$COMMIT_MESSAGE" || {
              echo "Failed to commit to $repo"
              cd ..
              rm -rf "${repo##*/}"
              continue
            }
            
            # Configure git to use PAT for push
            git remote set-url origin "https://${PAT_TOKEN}@github.com/${repo}.git"
            
            # Push changes with verbose output
            if git push origin "$DEFAULT_BRANCH" 2>&1; then
              echo "Successfully committed and pushed to $repo"
            else
              echo "Failed to push to $repo - checking if branch protection is enabled"
            fi
            
            cd ..
            
            # Clean up
            rm -rf "${repo##*/}"
          done
      
      - name: Cleanup
        if: always()
        run: |
          rm -rf /tmp/repos
